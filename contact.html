    <meta charset="UTF-8">

<body>
    <nav>
        <div class="logo">Mizyaal</div>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="education.html">Education</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>
    <div class="container">
        <h2>Get In Touch</h2>
        <p style="text-align: center; color: #666; margin-bottom: 30px;">Feel free to reach out for collaborations or just a friendly hello!</p>
        
        <form action="https://formsubmit.co/mizyaal@example.com" method="POST" class="contact-form">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="subject">Subject</label>
                <input type="text" id="subject" name="subject" required>
            </div>
            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" rows="6" required></textarea>
            </div>
            <button type="submit" class="submit-btn">Send Message</button>
        </form>
        
        <div style="text-align: center; margin-top: 40px; border-top: 1px solid #ddd; padding-top: 30px;">
            <h3>Other Ways to Connect</h3>
            <p><strong>Email:</strong> mizyaal@example.com</p>
            <p><a href="#" class="social-link">LinkedIn</a> | <a href="#" class="social-link">GitHub</a></p>
        </div>
    </div>
